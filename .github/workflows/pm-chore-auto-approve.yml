name: PM-CHORE Auto-Approve

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto-approve eligible PM-CHORE PR
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      startsWith(github.event.pull_request.head.ref, 'chore/pm-chore-')

    steps:
      - name: Check eligibility and choose reviewer identity
        id: policy
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Restrict to PM-CHORE style governance PRs only.
            const titleOk = /^chore\(pm\):/i.test(pr.title || '');
            if (!titleOk) {
              core.setOutput('eligible', 'false');
              core.setOutput('reason', 'Title is not PM-CHORE format.');
              return;
            }

            // Restrict file scope to governance transition files only.
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );
            const changed = files.map((f) => f.filename);
            const allowed = changed.every((path) => (
              path === 'CURRENT_PE.md' ||
              /^ELIS_MultiAgent_Implementation_Plan_v[0-9_]+\.md$/.test(path) ||
              /^docs\/_archive\/2026-[0-9]{2}\/ELIS_MultiAgent_Implementation_Plan_v[0-9_]+\.md$/.test(path)
            ));
            if (!allowed) {
              core.setOutput('eligible', 'false');
              core.setOutput('reason', `Out-of-scope files in PM-CHORE PR: ${changed.join(', ')}`);
              return;
            }

            // Never self-approve: choose opposite reviewer bot token.
            const author = (pr.user?.login || '').toLowerCase();
            let reviewerTokenSecret = '';
            if (author === 'elis-codex-bot') {
              reviewerTokenSecret = 'CLAUDE_BOT_TOKEN';
            } else if (author === 'elis-claude-bot') {
              reviewerTokenSecret = 'CODEX_BOT_TOKEN';
            } else if (author === 'elis-pm-bot') {
              reviewerTokenSecret = 'CODEX_BOT_TOKEN';
            } else {
              core.setOutput('eligible', 'false');
              core.setOutput('reason', `Unsupported PM-CHORE author '${author}'.`);
              return;
            }

            // Avoid duplicate approvals if already approved.
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );
            const hasApproval = reviews.some((r) => String(r.state).toUpperCase() === 'APPROVED');
            if (hasApproval) {
              core.setOutput('eligible', 'false');
              core.setOutput('reason', 'PR already has at least one formal approval review.');
              return;
            }

            core.setOutput('eligible', 'true');
            core.setOutput('reviewer_token_secret', reviewerTokenSecret);

      - name: Approve as mapped reviewer bot (CLAUDE)
        if: steps.policy.outputs.eligible == 'true' && steps.policy.outputs.reviewer_token_secret == 'CLAUDE_BOT_TOKEN'
        uses: actions/github-script@v7
        env:
          REVIEWER_TOKEN: ${{ secrets.CLAUDE_BOT_TOKEN }}
        with:
          github-token: ${{ env.REVIEWER_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'PASS — PM-CHORE governance transition approved automatically (mapped reviewer identity).'
            });

      - name: Approve as mapped reviewer bot (CODEX)
        if: steps.policy.outputs.eligible == 'true' && steps.policy.outputs.reviewer_token_secret == 'CODEX_BOT_TOKEN'
        uses: actions/github-script@v7
        env:
          REVIEWER_TOKEN: ${{ secrets.CODEX_BOT_TOKEN }}
        with:
          github-token: ${{ env.REVIEWER_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'PASS — PM-CHORE governance transition approved automatically (mapped reviewer identity).'
            });

      - name: Note skipped policy outcome
        if: steps.policy.outputs.eligible != 'true'
        run: echo "PM-CHORE auto-approve skipped: ${{ steps.policy.outputs.reason }}"
