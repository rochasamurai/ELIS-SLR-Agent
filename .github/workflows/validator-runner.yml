name: Validator Agent Runner

on:
  workflow_dispatch:
    inputs:
      pe_id:
        required: true
        type: string
      branch:
        required: true
        type: string
      engine:
        required: true
        type: choice
        options:
          - codex
          - claude
      plan_file:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      pr_number:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-validator:
    name: Run validator for ${{ inputs.pe_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          # Validator uses the opposite bot token to the implementer.
          # codex validator -> elis-codex-bot, claude validator -> elis-claude-bot.
          token: ${{ inputs.engine == 'codex' && secrets.CODEX_BOT_TOKEN || secrets.CLAUDE_BOT_TOKEN }}

      - name: Configure Git identity (Codex validator)
        if: inputs.engine == 'codex'
        run: |
          git config user.name "elis-codex-bot"
          git config user.email "elis-codex-bot@users.noreply.github.com"

      - name: Configure Git identity (Claude validator)
        if: inputs.engine == 'claude'
        run: |
          git config user.name "elis-claude-bot"
          git config user.email "elis-claude-bot@users.noreply.github.com"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black==24.8.0 ruff==0.6.9

      - name: Install Codex CLI
        if: inputs.engine == 'codex'
        run: npm install -g @openai/codex@0.118.0

      - name: Install Claude CLI
        if: inputs.engine == 'claude'
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Verify Codex auth
        if: inputs.engine == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/verify_codex_auth.py

      - name: Write Codex auth.json (apikey mode)
        if: inputs.engine == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p ~/.codex
          python -c "import json,os; json.dump({'auth_mode':'apikey','OPENAI_API_KEY':os.environ['OPENAI_API_KEY']},open(os.path.expanduser('~/.codex/auth.json'),'w'))"
          python -c "import json,os; d=json.load(open(os.path.expanduser('~/.codex/auth.json'))); print('auth.json OK — auth_mode:',d['auth_mode'],'key_len:',len(d.get('OPENAI_API_KEY','')))"

      - name: Smoke-test Codex CLI
        if: inputs.engine == 'codex'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: codex --version && codex exec --skip-git-repo-check --dangerously-bypass-approvals-and-sandbox "echo SMOKE_OK" < /dev/null

      - name: Verify Claude auth
        if: inputs.engine == 'claude'
        env:
          CLAUDE_SETUP_TOKEN: ${{ secrets.CLAUDE_SETUP_TOKEN }}
        run: python scripts/verify_claude_auth.py

      - name: Run CODEX validator
        if: inputs.engine == 'codex'
        env:
          GH_TOKEN: ${{ secrets.CODEX_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m scripts.run_codex_validator \
            --pe-id "${{ inputs.pe_id }}" \
            --plan "${{ inputs.plan_file }}" \
            --branch "${{ inputs.branch }}" \
            --base-branch "${{ inputs.base_branch }}" \
            --pr-number "${{ inputs.pr_number }}"

      - name: Run Claude validator
        if: inputs.engine == 'claude'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_BOT_TOKEN }}
          CLAUDE_SETUP_TOKEN: ${{ secrets.CLAUDE_SETUP_TOKEN }}
        run: |
          python -m scripts.run_claude_validator \
            --pe-id "${{ inputs.pe_id }}" \
            --plan "${{ inputs.plan_file }}" \
            --branch "${{ inputs.branch }}" \
            --base-branch "${{ inputs.base_branch }}" \
            --pr-number "${{ inputs.pr_number }}"

      - name: Verify REVIEW file committed and formal review posted
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          from scripts.validator_runner_common import (
              verify_review_committed,
              verify_formal_review_posted,
              RunnerError,
          )
          try:
              verify_review_committed('${{ inputs.pe_id }}', '${{ inputs.base_branch }}')
              verify_formal_review_posted('${{ inputs.pr_number }}')
          except RunnerError as exc:
              print(f'FAIL: {exc}', file=sys.stderr)
              sys.exit(1)
          EOF
        env:
          GH_TOKEN: ${{ inputs.engine == 'codex' && secrets.CODEX_BOT_TOKEN || secrets.CLAUDE_BOT_TOKEN }}

      - name: Read verdict from REVIEW file
        id: verdict
        run: |
          review_file="REVIEW_$(echo '${{ inputs.pe_id }}' | tr '-' '_').md"
          REVIEW_FILE="$review_file" python scripts/parse_verdict.py

      - name: Post fail assignment (elis-pm-bot)
        if: steps.verdict.outputs.verdict == 'FAIL'
        env:
          GH_TOKEN: ${{ secrets.PM_BOT_TOKEN }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, '.')
          from scripts.validator_runner_common import post_fail_assignment
          engine = '${{ inputs.engine }}'
          # Implementer engine is opposite of validator engine.
          implementer_engine = 'codex' if engine == 'claude' else 'claude'
          post_fail_assignment('${{ inputs.pr_number }}', implementer_engine)
          EOF
