name: PM Discord Command

on:
  workflow_dispatch:
    inputs:
      command:
        required: true
        type: choice
        options:
          - status
          - auth-check
          - pause
          - resume
          - veto
          - override-pass
      pr_number:
        required: false
        type: string
      actor:
        required: false
        default: PO
        type: string
      reason:
        required: false
        default: ""
        type: string
  repository_dispatch:
    types:
      - pm-discord-command

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  command:
    runs-on: ubuntu-latest
    env:
      PM_COMMAND: ${{ github.event_name == 'workflow_dispatch' && inputs.command || github.event.client_payload.command || '' }}
      PM_PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.client_payload.pr_number || '' }}
      PM_ACTOR: ${{ github.event_name == 'workflow_dispatch' && inputs.actor || github.event.client_payload.actor || 'PO' }}
      PM_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.reason || github.event.client_payload.reason || '' }}

    steps:
      - name: Checkout main with PM bot token
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PM_BOT_TOKEN }}

      - name: Configure PM bot git identity
        run: |
          git config user.name "elis-pm-bot"
          git config user.email "elis-pm-bot@users.noreply.github.com"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Handle control command
        if: contains('pause resume veto override-pass', env.PM_COMMAND)
        id: control
        env:
          PR_NUMBER: ${{ env.PM_PR_NUMBER }}
        run: |
          args=(
            --command "$PM_COMMAND"
            --actor "$PM_ACTOR"
            --reason "$PM_REASON"
            --write
            --json
          )
          if [ -n "$PR_NUMBER" ]; then
            args+=(--pr-number "$PR_NUMBER")
          fi
          python scripts/pm_discord_command.py "${args[@]}" > command.json

      - name: Handle status command
        if: env.PM_COMMAND == 'status'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_SETUP_TOKEN: ${{ secrets.CLAUDE_SETUP_TOKEN }}
        run: |
          python scripts/generate_pe_status_report.py > command.txt
          python - <<'EOF'
          import json
          from pathlib import Path
          Path("command.json").write_text(
              json.dumps(
                  {
                      "command": "status",
                      "message": Path("command.txt").read_text(encoding="utf-8").strip(),
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          EOF

      - name: Handle auth-check command
        if: env.PM_COMMAND == 'auth-check'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_SETUP_TOKEN: ${{ secrets.CLAUDE_SETUP_TOKEN }}
        run: |
          python scripts/pm_status_reporter.py --command auth-check > command.txt
          python - <<'EOF'
          import json
          from pathlib import Path
          Path("command.json").write_text(
              json.dumps(
                  {
                      "command": "auth-check",
                      "message": Path("command.txt").read_text(encoding="utf-8").strip(),
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          EOF

      - name: Commit updated loop control
        if: contains('pause resume veto', env.PM_COMMAND)
        run: |
          case "$PM_COMMAND" in
            veto) COMMIT_MESSAGE='chore(pm): apply veto and pause loop' ;;
            pause) COMMIT_MESSAGE='chore(pm): pause autonomous loop' ;;
            *) COMMIT_MESSAGE='chore(pm): resume autonomous loop' ;;
          esac
          git add config/pm_loop_control.json
          if git diff --cached --quiet; then
            echo "No loop-control changes to commit."
          else
            git commit -m "$COMMIT_MESSAGE"
            git push origin HEAD:main
          fi

      - name: Apply PM veto label
        if: env.PM_COMMAND == 'veto'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PM_BOT_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PM_PR_NUMBER, 10);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['pm-review-required'],
            });

      - name: Post Discord command payload to PM Agent webhook
        if: env.PM_AGENT_WEBHOOK_URL != ''
        env:
          PM_AGENT_WEBHOOK_URL: ${{ secrets.PM_AGENT_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import json
          import os
          import urllib.request
          from pathlib import Path

          payload = json.loads(Path("command.json").read_text(encoding="utf-8"))
          payload["event"] = "pm-discord-command"
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              os.environ["PM_AGENT_WEBHOOK_URL"],
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              print(f"Webhook status: {response.status}")
          EOF
