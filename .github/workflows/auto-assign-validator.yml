# Classification: Orchestration — dispatches agent sessions, manages PRs/labels, or pushes commits; may use bot tokens; not a code-validation gate.
name: Auto-assign Validator

on:
  workflow_run:
    # Must match the 'name:' field in ci.yml exactly.
    workflows: ["ELIS - CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  gate-1:
    name: Verify Status Packet and assign Validator
    runs-on: ubuntu-latest
    # Only run when CI succeeded on a non-main branch PR.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch != 'main'

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Resolve PR number and body
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });
            if (prs.data.length === 0) {
              core.warning('No open PR found for this branch — skipping auto-assign.');
              core.setOutput('number', '');
              return;
            }
            core.setOutput('number', String(prs.data[0].number));
            core.setOutput('body', prs.data[0].body || '');

      - name: Verify Status Packet completeness
        if: steps.pr.outputs.number != ''
        run: python scripts/check_status_packet.py

      - name: Verify HANDOFF.md present and complete
        if: steps.pr.outputs.number != ''
        run: python scripts/check_handoff.py

      - name: Verify role registration
        if: steps.pr.outputs.number != ''
        run: python scripts/check_role_registration.py

      - name: Resolve validator agent mention
        id: validator
        if: steps.pr.outputs.number != ''
        run: |
          mention=$(python - <<'EOF'
          import re, sys
          from pathlib import Path
          content = Path('CURRENT_PE.md').read_text(encoding='utf-8')
          # Find the validator agent id from the Active PE Registry for the current PE.
          pe_match = re.search(r'^\|\s*PE\s*\|\s*(PE(?:-[A-Z0-9]+)+)\s*\|', content, re.MULTILINE)
          if not pe_match:
              print('@claude-code')
              sys.exit(0)
          pe_id = pe_match.group(1)
          row_match = re.search(
              rf'^\|\s*{re.escape(pe_id)}\s*\|[^|]+\|[^|]+\|\s*([^|]+?)\s*\|',
              content, re.MULTILINE,
          )
          if not row_match:
              print('@claude-code')
              sys.exit(0)
          validator_agent = row_match.group(1).strip().lower()
          if 'codex' in validator_agent:
              print('@codex')
          elif 'gemini' in validator_agent:
              print('@gemini-cli')
          else:
              print('@claude-code')
          EOF
          )
          echo "mention=${mention}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Auto-assign Validator via PR comment
        if: success() && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          # Must use PM_BOT_TOKEN (a PAT), not github.token.
          # Comments posted by GITHUB_TOKEN do not trigger other workflow runs
          # (GitHub platform rule to prevent infinite loops). The validator-dispatch
          # workflow listens for the <!-- validator-assignment --> tag on issue_comment
          # events — that event will only fire if the comment is posted by a PAT.
          github-token: ${{ secrets.PM_BOT_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const mention = '${{ steps.validator.outputs.mention }}' || '@claude-code';
            const body = [
              '## 🤖 Gate 1 — automated',
              '',
              'All automated checks passed:',
              '- ✅ Status Packet complete',
              '- ✅ HANDOFF.md present with all required sections',
              '- ✅ Role registration valid',
              '- ✅ CI quality gates green',
              '',
              `${mention} — assigned as Validator. Begin review.`,
              '',
              '_PM notified. No manual approval required for routine PEs._',
              '_PM veto: close this PR to block merge._',
              '',
              '<!-- validator-assignment -->'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

      - name: Post gate-1 commit status on current HEAD
        if: success() && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PM_BOT_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.workflow_run.head_sha,
              state: 'success',
              context: 'gate-1',
              description: 'Gate 1 passed and validator assigned automatically.'
            });

      - name: Notify PM on failure
        if: failure() && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '## ⚠️ Gate 1 — manual PM review required\n\nAutomated checks did not pass. PM must review and assign Validator manually.'
            });
