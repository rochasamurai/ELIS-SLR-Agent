# Classification: Orchestration — dispatches agent sessions, manages PRs/labels, or pushes commits; may use bot tokens; not a code-validation gate.
name: PM — Plan Load (!plan load validation)

# Triggered by the PM Agent's Discord `!plan load` command (via workflow_dispatch)
# or directly when a plan file PR is opened.
# Validates the JSON plan with scripts/plan_loader.py and posts a Discord webhook
# confirmation before allowing the sequencer to start the new release.

on:
  workflow_dispatch:
    inputs:
      plan_file:
        description: "Path to the JSON plan file in the repo (e.g. plans/plan_v2.json)"
        required: true
        default: "plan.json"
      already_merged:
        description: "Comma-separated PE IDs already merged (optional)"
        required: false
        default: ""

jobs:
  validate-plan:
    name: Validate plan and confirm via Discord
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet black ruff

      - name: Run plan_loader validation
        id: validate
        run: |
          ARGS="${{ inputs.plan_file }}"
          if [ -n "${{ inputs.already_merged }}" ]; then
            ARGS="$ARGS --already-merged ${{ inputs.already_merged }}"
          fi
          ARGS="$ARGS --json"
          python -m scripts.plan_loader $ARGS > /tmp/plan_result.json
          echo "result=$(cat /tmp/plan_result.json | tr -d '\n')" >> "$GITHUB_OUTPUT"
          echo "Plan validation PASSED"
          cat /tmp/plan_result.json

      - name: Post Discord confirmation (!plan load — VALID)
        if: success()
        env:
          PM_AGENT_WEBHOOK_URL: ${{ secrets.PM_AGENT_WEBHOOK_URL }}
        run: |
          RESULT='${{ steps.validate.outputs.result }}'
          FIRST_PE=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('first_pe','unknown'))")
          PE_COUNT=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('pe_count',0))")
          MSG="plan load VALID: ${PE_COUNT} PEs validated. First ready PE: ${FIRST_PE}. Sequencer may start."
          if [ -n "$PM_AGENT_WEBHOOK_URL" ]; then
            curl -s -X POST "$PM_AGENT_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"$MSG\"}"
          else
            echo "Discord webhook not configured — skipping notification."
          fi
          echo "$MSG"

      - name: Post Discord confirmation (!plan load — INVALID)
        if: failure()
        env:
          PM_AGENT_WEBHOOK_URL: ${{ secrets.PM_AGENT_WEBHOOK_URL }}
        run: |
          MSG="plan load INVALID: plan validation failed. Sequencer blocked. Check workflow logs for diagnosis."
          if [ -n "$PM_AGENT_WEBHOOK_URL" ]; then
            curl -s -X POST "$PM_AGENT_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"$MSG\"}"
          else
            echo "Discord webhook not configured — skipping notification."
          fi
          echo "$MSG"
          exit 1
