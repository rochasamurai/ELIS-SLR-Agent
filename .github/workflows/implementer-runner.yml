name: Implementer Agent Runner

on:
  workflow_dispatch:
    inputs:
      pe_id:
        required: true
        type: string
      branch:
        required: true
        type: string
      engine:
        required: true
        type: choice
        options:
          - codex
          - claude
      plan_file:
        required: true
        type: string
      base_branch:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-implementer:
    name: Run implementer for ${{ inputs.pe_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      MAX_COMMITS: "20"
      RUNNER_TIMEOUT_SECONDS: "14400"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ inputs.engine == 'codex' && secrets.CODEX_BOT_TOKEN || secrets.CLAUDE_BOT_TOKEN }}

      - name: Prepare target branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin --prune
          if git ls-remote --exit-code --heads origin "${{ inputs.branch }}" >/dev/null 2>&1; then
            git checkout -B "${{ inputs.branch }}" "origin/${{ inputs.branch }}"
          else
            git checkout -B "${{ inputs.branch }}" "origin/${{ inputs.base_branch }}"
          fi

      - name: Configure Git identity (Codex)
        if: inputs.engine == 'codex'
        run: |
          git config user.name "elis-codex-bot"
          git config user.email "elis-codex-bot@users.noreply.github.com"

      - name: Configure Git identity (Claude)
        if: inputs.engine == 'claude'
        run: |
          git config user.name "elis-claude-bot"
          git config user.email "elis-claude-bot@users.noreply.github.com"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Codex CLI
        if: inputs.engine == 'codex'
        run: npm install -g @openai/codex

      - name: Install Claude CLI
        if: inputs.engine == 'claude'
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Verify Codex auth
        if: inputs.engine == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/verify_codex_auth.py

      - name: Write Codex auth.json
        if: inputs.engine == 'codex'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json

      - name: Verify Claude auth
        if: inputs.engine == 'claude'
        env:
          CLAUDE_SETUP_TOKEN: ${{ secrets.CLAUDE_SETUP_TOKEN }}
        run: python scripts/verify_claude_auth.py

      - name: Run CODEX implementer
        if: inputs.engine == 'codex'
        env:
          GH_TOKEN: ${{ secrets.CODEX_BOT_TOKEN }}
        run: |
          python scripts/run_codex_agent.py \
            --pe-id "${{ inputs.pe_id }}" \
            --plan "${{ inputs.plan_file }}" \
            --branch "${{ inputs.branch }}" \
            --base-branch "${{ inputs.base_branch }}"

      - name: Run Claude implementer
        if: inputs.engine == 'claude'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_BOT_TOKEN }}
        run: |
          python scripts/run_claude_agent.py \
            --pe-id "${{ inputs.pe_id }}" \
            --plan "${{ inputs.plan_file }}" \
            --branch "${{ inputs.branch }}" \
            --base-branch "${{ inputs.base_branch }}"
