# OpenClaw is no longer run from this Compose file on elis-server.
# It is installed natively and managed as a systemd user service.
# Keep this file only as a migration artifact until native runbooks fully replace it.
#
# Migration completed in PE-MS-01 (2026-03-22).
# Reason: Docker's loopback binding prevented Web UI access and caused
# path isolation issues with exec commands and the memory system.
#
# To manage the native service:
#   systemctl --user status openclaw-gateway
#   systemctl --user restart openclaw-gateway
#   journalctl --user -u openclaw-gateway -f
#
# Service file: ~/.config/systemd/user/openclaw-gateway.service
# Web UI: http://localhost:18789  (token: openclaw dashboard --no-open)

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    # DISABLED — replaced by native systemd service (PE-MS-01)
    profiles:
      - docker-disabled
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,noexec
    env_file:
      - ${HOME}/.openclaw/.env
    environment:
      OPENCLAW_STATE_DIR: /app/.openclaw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    volumes:
      - ${HOME}/.openclaw:/app/.openclaw:rw
      - ${HOME}/openclaw/workspace-pm:/app/workspaces/workspace-pm:rw
      - ${HOME}/openclaw/workspace-pm:/app/workspace-pm:rw
      - ${HOME}/openclaw/workspace-prog-impl:/app/workspaces/workspace-prog-impl:ro
      - ${HOME}/openclaw/workspace-infra-impl:/app/workspaces/workspace-infra-impl:ro
      - ${HOME}/openclaw/workspace-prog-val:/app/workspaces/workspace-prog-val:ro
      - ${HOME}/openclaw/workspace-infra-val:/app/workspaces/workspace-infra-val:ro
      - ${HOME}/openclaw/workspace-slr-impl:/app/workspaces/workspace-slr-impl:ro
      - ${HOME}/openclaw/workspace-slr-val:/app/workspaces/workspace-slr-val:ro
